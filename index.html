<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playfr – Neon Arcade Browser Games</title>
  <meta name="description" content="Playfr – ultimate neon arcade vibes, 100+ instant free browser games, no downloads!"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --card: #0a0015;
      --accent: #00ffff;
      --accent2: #ff00ff;
      --accent3: #39ff14;
      --accent4: #ffea00;
      --text: #f0f8ff;
      --glow: rgba(0, 255, 255, 0.7);
      --glow2: rgba(255, 0, 255, 0.6);
      --glow3: rgba(57, 255, 20, 0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Bungee', cursive;
      line-height: 1.4;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #000, #100020);
      padding: 5rem 1rem 3rem;
      text-align: center;
      border-bottom: 8px solid var(--accent);
      box-shadow: 0 0 60px var(--glow), 0 0 120px var(--glow2);
    }
    h1 {
      font-size: clamp(4rem, 12vw, 7.5rem);
      margin-bottom: 1rem;
      color: #00ffff;
      -webkit-text-stroke: 1.5px #000;
      text-stroke: 1.5px #000;
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #ff00ff,
        0 0 40px #39ff14;
      letter-spacing: 4px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-weight: 400;
    }
    .tagline {
      font-size: 1.8rem;
      opacity: 0.92;
      margin-bottom: 2.5rem;
      text-shadow: 0 0 20px var(--glow);
    }
    .search-container {
      max-width: 800px;
      margin: 0 auto 4rem;
    }
    #search {
      width: 100%;
      padding: 1.4rem 2.5rem;
      font-size: 1.6rem;
      border: 4px solid var(--accent);
      border-radius: 80px;
      background: rgba(10,0,30,0.7);
      color: white;
      outline: none;
      font-family: 'Bungee', cursive;
      text-shadow: 0 0 8px var(--accent);
      box-shadow: inset 0 0 25px rgba(0,255,255,0.3);
    }
    #search:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 50px var(--glow2);
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 4rem 3rem;
    }
    .game-card {
      background: var(--card);
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.4s ease;
      box-shadow: 0 15px 45px rgba(0,0,0,0.8), 0 0 35px rgba(0,255,255,0.2);
      border: 3px solid transparent;
    }
    .game-card:hover {
      transform: translateY(-20px) scale(1.06);
      box-shadow: 0 30px 80px rgba(0,212,255,0.5), 0 0 80px var(--glow);
      border-color: var(--accent);
    }
    .game-preview {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-bottom: 6px solid var(--accent);
      filter: brightness(1.15) contrast(1.1) saturate(1.2);
    }
    .game-info {
      padding: 1.8rem;
      text-align: center;
    }
    .game-title {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--accent);
      text-shadow: 0 0 15px var(--glow);
    }
    .game-desc {
      font-size: 1.2rem;
      opacity: 0.88;
      margin-bottom: 1.6rem;
      min-height: 5em;
      color: #d0f8ff;
    }
    .play-btn {
      display: inline-block;
      background: linear-gradient(45deg, var(--accent), var(--accent2), var(--accent3));
      color: #000;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.4rem;
      transition: all 0.3s;
      box-shadow: 0 0 30px var(--glow);
      margin: 0.5rem;
      cursor: pointer;
      border: none;
    }
    .play-btn:hover {
      transform: scale(1.15) rotate(3deg);
      box-shadow: 0 0 60px var(--glow2);
    }
    .game-iframe-container {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .game-iframe {
      width: 95%;
      height: 85%;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 50px var(--glow);
    }
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #ff0044;
      color: white;
      border: none;
      padding: 1rem 1.5rem;
      font-size: 1.5rem;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 20px #ff0044;
    }
    footer {
      text-align: center;
      padding: 4rem 1rem;
      border-top: 5px solid var(--accent3);
      margin-top: 5rem;
      opacity: 0.85;
      font-size: 1.3rem;
      text-shadow: 0 0 15px var(--accent3);
    }
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; gap: 3.5rem; }
    }
  </style>
</head>

      { title: "Connections", desc: "Group words into themed categories.", image: "https://via.placeholder.com/400x250/000/00ffff?text=Connections", url: "https://www.nytimes.com/games/connections", tags: "word puzzle daily" },
      { title: "Townscaper", desc: "Build beautiful towns with no rules.", image: "https://via.placeholder.com/400x250/000/00ffff?text=Townscaper", url: "https://oskarstalberg.com/Townscaper/", tags: "building creative" },
      { title: "Mini Blox", desc: "Blocky adventure & mini-games.", image: "https://via.placeholder.com/400x250/000/00ffff?text=Mini+Blox", url: "https://www.crazygames.com/game/miniblox", tags: "adventure mini" },
      // ... (you can keep adding more from earlier lists – this is already over 100)
    ];

    const grid = document.getElementById('games-grid');
    const searchInput = document.getElementById('search');
    const gameModal = document.getElementById('gameModal');
    const gameIframe = document.getElementById('gameIframe');
    const closeModal = document.getElementById('closeModal');

    function renderGames(filteredGames) {
      grid.innerHTML = '';
      filteredGames.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <img src="${game.image}" alt="${game.title} preview" class="game-preview">
          <div class="game-info">
            <h3 class="game-title">${game.title}</h3>
            <p class="game-desc">${game.desc}</p>
            <button class="play-btn" data-url="${game.url}">PLAY IN APP</button>
          </div>
        `;
        grid.appendChild(card);
      });

      document.querySelectorAll('.play-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const url = e.target.dataset.url;
          gameIframe.src = url;
          gameModal.style.display = 'flex';
        });
      });
    }

    renderGames(games);

    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      const filtered = games.filter(g =>
        g.title.toLowerCase().includes(term) ||
        g.desc.toLowerCase().includes(term) ||
        (g.tags && g.tags.toLowerCase().includes(term))
      );
      renderGames(filtered);
    });

    closeModal.addEventListener('click', () => {
      gameModal.style.display = 'none';
      gameIframe.src = '';
    });

    gameModal.addEventListener('click', (e) => {
      if (e.target === gameModal) {
        gameModal.style.display = 'none';
        gameIframe.src = '';
      }
    });
  </script>
</body>
</html>
